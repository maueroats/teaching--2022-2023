<p>removeVowels word = [ letter | letter &lt;- word, not (letter <code>elem</code> &ldquo;aeiouAEIOU&rdquo; )]</p>
<p>wordLenPairs wordlist = [ (word, length word) | word &lt;- wordlist ]</p>
